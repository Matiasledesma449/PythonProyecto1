{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Servis de PC{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'myapp/css/styles.css' %}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    </head>
    <body>
        <header>
            <nav class="navbar navbar-light static-top">
                <div class="container">
                    <a class="navbar-brand text-white" href="{% url 'myapp:index' %}">Inicio</a>
                    <a class="navbar-brand text-white" href="{% url 'myapp:clientes' %}">Clientes</a>
                    <a class="navbar-brand text-white" href="{% url 'myapp:tecnicos' %}">Tecnicos</a>
                    <a class="navbar-brand text-white" href="{% url 'myapp:equipos' %}">Equipo</a>
                    <a class="navbar-brand text-white" href="{% url 'myapp:reparaciones' %}">Reparaciones</a>
                    <a class="btn btn-primary" href="#NADAAUN">INICIAR</a> </div>
            </nav>
        </header>
        <main>
            {% block content %} <!-- Contenido específico de cada página irá aquí --> {% endblock %}
        </main>
        <footer class="text-center text-white py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Servis PC. Todos los derechos reservados.</p>
        </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
